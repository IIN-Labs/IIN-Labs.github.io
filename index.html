<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIN-Labs: Instituto de Inteligencia Natural — Laboratorios</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    font-family:'Montserrat', sans-serif;
    color:white;
}

/* Imagen de fondo responsive */
body {
    background-image: url('arp_001.JPG');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* Overlay opcional */
.overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.1.5);
    z-index:0;
}
    
/* Contenido en esquina superior izquierda */
.content {
    position:fixed;
    top:4vh;
    left:4vw;
    z-index:1;
}

/* Escalado fluido */
h1 {
    margin:0;
    font-weight:500;
    font-size:clamp(28px, 4vw, 56px);
    letter-spacing:-0.5px;
}

p {
    margin-top:6px;
    font-weight:500;
    font-size:clamp(14px, 1.5vw, 20px);
    opacity:1;
}    
    
</style>

</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>IIN-Labs</h1>
  <p>Instituto de Inteligencia Natural</p>
</div>

</body>
</html>
